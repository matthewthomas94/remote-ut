<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Component - Particle Warp Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Europa', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffffff;
            padding: 20px;
        }

        .alert-container {
            position: relative;
            width: 337px;
            height: 96px;
            background: #F5FCFD;
            border: 1px solid #80DDE9;
            border-radius: 12px;
            box-shadow:
                0px 4px 12px 0px #F5FCFD,
                0px 8px 16px 0px rgba(128, 221, 233, 0.33);
            overflow: hidden;
            transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        .blur-active {
            filter: blur(8px);
            opacity: 0.6;
        }

        .content-area {
            position: absolute;
            top: 7px;
            left: 11px;
            width: 313px;
            height: 90px;
            z-index: 5;
        }

        .icon-wrapper {
            position: absolute;
            left: 0;
            top: 45px;
            width: 30px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }

        .star-icon {
            padding-top: 3px;
            width: 24px;
            height: 24px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        .carrier-icon-img {
            width: 22px;
            height: 22px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
            opacity: 0;
            object-fit: contain;
        }

        .text-content {
            position: absolute;
            left: 30px;
            top: 45px;
            width: 283px;
            height: 28px;
            /* Match icon wrapper height */
            color: #006064;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Vertically center aligned */
        }

        .description {
            position: absolute;
            top: 5px;
            left: 0;
            font-size: 14px;
            font-weight: 500;
            color: #006064;
            width: 100%;
            transition: color 0.5s ease, filter 0.5s ease, opacity 0.5s ease;
        }

        .title {
            position: relative;
            margin-left: 5px;
            /* Replaces absolute left: 5px */
            font-size: 14px;
            font-weight: 400;
            line-height: 1;
            letter-spacing: 0.2px;
            padding-top: 4px;
            transition: color 0.5s ease, filter 0.5s ease, opacity 0.5s ease;
        }

        .points-value {
            position: relative;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1.0), 0 0 15px rgba(255, 255, 255, 0.8);
            transition: color 0.5s ease, filter 0.5s ease, opacity 0.5s ease;
        }

        /* Particle Canvas */
        .particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #pointsValue {
            display: inline-block;
        }

        #pointsValue.bobbing {
            animation: bob 4000ms ease-in-out infinite;
        }

        @keyframes bob {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(1px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body>
    <div class="alert-container">
        <div class="particle-canvas">
            <canvas id="particleCanvas"></canvas>
        </div>

        <div class="content-area">
            <div class="description">This is what your expenses get you</div>
            <div class="icon-wrapper">
                <svg class="star-icon" width="22" height="22" viewBox="0 0 22 22" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10.9909 1.83301C5.93087 1.83301 1.83337 5.93967 1.83337 10.9997C1.83337 16.0597 5.93087 20.1663 10.9909 20.1663C16.06 20.1663 20.1667 16.0597 20.1667 10.9997C20.1667 5.93967 16.06 1.83301 10.9909 1.83301ZM13.9517 15.9405L11 14.1622L8.04837 15.9405C7.70004 16.1513 7.26921 15.8397 7.36087 15.4455L8.14004 12.0905L5.54587 9.84467C5.24337 9.57884 5.40837 9.07467 5.81171 9.03801L9.24004 8.74467L10.5784 5.58217C10.7342 5.20634 11.2659 5.20634 11.4217 5.58217L12.76 8.73551L16.1884 9.02884C16.5917 9.06551 16.7567 9.56967 16.445 9.83551L13.8509 12.0813L14.63 15.4455C14.7217 15.8397 14.3 16.1513 13.9517 15.9405Z"
                        fill="#00ACC1" />
                </svg>
            </div>

            <div class="text-content">
                <p class="title">PayRewards</p>
                <p class="points-value"><span id="pointsValue">0</span> <span class="points-suffix">pts</span></p>
            </div>
        </div>
    </div>

    <button id="restartBtn"
        style="position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: #00ACC1; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 500;">Restart
        Animation</button>

    <script>
        // Configuration Variables
        const FLOOR = 0;
        const CEILING = 12000000;

        const CARRIERS = [
            {
                id: 'original',
                title: 'PayRewards',
                value: 12000000,
                suffix: 'pts',
                color: '#00ACC1',
                viewBox: '0 0 22 22',
                innerHtml: '<path d="M10.9909 1.83301C5.93087 1.83301 1.83337 5.93967 1.83337 10.9997C1.83337 16.0597 5.93087 20.1663 10.9909 20.1663C16.06 20.1663 20.1667 16.0597 20.1667 10.9997C20.1667 5.93967 16.06 1.83301 10.9909 1.83301ZM13.9517 15.9405L11 14.1622L8.04837 15.9405C7.70004 16.1513 7.26921 15.8397 7.36087 15.4455L8.14004 12.0905L5.54587 9.84467C5.24337 9.57884 5.40837 9.07467 5.81171 9.03801L9.24004 8.74467L10.5784 5.58217C10.7342 5.20634 11.2659 5.20634 11.4217 5.58217L12.76 8.73551L16.1884 9.02884C16.5917 9.06551 16.7567 9.56967 16.445 9.83551L13.8509 12.0813L14.63 15.4455C14.7217 15.8397 14.3 16.1513 13.9517 15.9405Z" fill="#00ACC1" />',
                imgSrc: null,
                descriptionText: 'This is what your expenses get you',
                // Styles
                backgroundColor: '#F5FCFD',
                borderColor: '#80DDE9',
                textColor: '#006064',
                descriptionColor: '#006064',
                particleColor: '#80DDE9',
                boxShadow: '0px 4px 12px 0px #F5FCFD, 0px 8px 16px 0px rgba(128, 221, 233, 0.33)'
            },
            {
                id: 'qantas',
                title: 'Qantas',
                value: 6000000,
                suffix: 'pts',
                color: '#E60000', // Kept for particle color if needed, though particles use hardcoded color in class.
                imgSrc: 'assets/qantas.png',
                descriptionText: 'Here is what your PayRewards get you',
                // Styles
                backgroundColor: '#B00E1E', // Deep Red
                borderColor: '#E60000',
                textColor: '#FFFFFF',
                descriptionColor: '#FFFFFF',
                particleColor: '#FFFFFF',
                boxShadow: '0px 4px 12px 0px rgba(176, 14, 30, 0.2), 0px 8px 16px 0px rgba(176, 14, 30, 0.33)'
            },
            {
                id: 'krisflyer',
                title: 'KrisFlyer',
                value: 4800000,
                suffix: 'mi',
                color: '#1D2548',
                imgSrc: 'assets/krisflyer.png',
                descriptionText: 'Here is what your PayRewards get you',
                // Styles
                backgroundColor: '#1D2548', // Deep Blue
                borderColor: '#2C3E50',
                textColor: '#FFFFFF',
                descriptionColor: '#FFFFFF',
                particleColor: '#FFFFFF',
                boxShadow: '0px 4px 12px 0px rgba(29, 37, 72, 0.2), 0px 8px 16px 0px rgba(29, 37, 72, 0.33)'
            }
        ];

        // ... existing Particle classes ...

        function updateDisplay(carrier) {
            const container = document.querySelector('.alert-container');
            const titleEl = document.querySelector('.title');
            const descriptionEl = document.querySelector('.description');
            const pointsValEl = document.getElementById('pointsValue');
            const pointsSuffixEl = document.querySelector('.points-suffix');
            const pointsContainerEl = document.querySelector('.points-value');
            const iconSvgEl = document.querySelector('.star-icon');
            let iconImgEl = document.querySelector('.carrier-icon-img');

            // Update Container Styles
            container.style.background = carrier.backgroundColor;
            container.style.borderColor = carrier.borderColor;
            container.style.boxShadow = carrier.boxShadow;

            // Update Particle Color
            if (window.particleSystem) {
                window.particleSystem.updateColor(carrier.particleColor);
            }

            // Create IMG element if it doesn't exist
            if (!iconImgEl) {
                iconImgEl = document.createElement('img');
                iconImgEl.className = 'carrier-icon-img';
                iconImgEl.className = 'carrier-icon-img';
                iconSvgEl.parentNode.appendChild(iconImgEl);
            }

            // Update Text
            titleEl.textContent = carrier.title;
            titleEl.style.color = carrier.textColor;
            descriptionEl.textContent = carrier.descriptionText;
            descriptionEl.style.color = carrier.descriptionColor;
            pointsContainerEl.style.color = carrier.textColor;

            // Handle Icon Toggle
            if (carrier.imgSrc) {
                iconImgEl.src = carrier.imgSrc;
                // Remove display:none/block to allow opacity transition
                iconSvgEl.style.display = '';
                iconImgEl.style.display = '';

                // Force reflow/next frame if needed? No, CSS transition handles it if property changes.
                // We just set opacity.
                iconImgEl.style.opacity = '1';
                iconSvgEl.style.opacity = '0';
            } else {
                iconSvgEl.style.display = '';
                iconImgEl.style.display = '';

                iconImgEl.style.opacity = '0';
                iconSvgEl.style.opacity = '1';

                // Only update SVG attributes if we are showing it
                if (carrier.viewBox) iconSvgEl.setAttribute('viewBox', carrier.viewBox);
                if (carrier.innerHtml) iconSvgEl.innerHTML = carrier.innerHtml;
            }

            // Update Value
            pointsValEl.textContent = carrier.value.toLocaleString();
            if (pointsSuffixEl) pointsSuffixEl.textContent = carrier.suffix;
        }

        function startCarrierCycle() {
            let currentIndex = 0;
            const elementsToBlur = [
                document.querySelector('.title'),
                document.querySelector('.description'),
                document.querySelector('.points-value'),
                document.querySelector('.icon-wrapper')
            ];

            setInterval(() => {
                // Blur In
                elementsToBlur.forEach(el => el.classList.add('blur-active'));

                // Wait for blur to apply (500ms)
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % CARRIERS.length;
                    updateDisplay(CARRIERS[currentIndex]);

                    // Blur Out
                    elementsToBlur.forEach(el => el.classList.remove('blur-active'));
                }, 500);
            }, 5500); // 5000ms view time + 500ms transition time effectively
        }


        class Particle {
            constructor(canvas, targetX, targetY, color = '#80DDE9') {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.targetX = targetX;
                this.targetY = targetY;

                this.baseSize = 0.5 + Math.random() * 0.5;
                this.maxOpacity = 1.0;
                this.color = color;

                this.reset();
            }

            setColor(color) {
                this.color = color;
            }

            reset() {
                this.progress = 0;
                this.opacity = 0;
                this.delay = Math.random() * 0.5;
                this.started = false;

                const rand = Math.random();
                let side; // 0: Left, 1: Top, 2: Right, 3: Bottom
                if (rand < 0.4) side = 2;
                else if (rand < 0.7) side = 0;
                else if (rand < 0.85) side = 1;
                else side = 3;

                if (side === 0) {
                    this.startX = Math.random() * 150;
                    this.startY = Math.random() * this.canvas.height;
                } else if (side === 1) {
                    this.startX = Math.random() * this.canvas.width;
                    this.startY = Math.random() * 40;
                } else if (side === 2) {
                    this.startX = this.canvas.width - Math.random() * 150;
                    this.startY = Math.random() * this.canvas.height;
                } else {
                    this.startX = Math.random() * this.canvas.width;
                    this.startY = this.canvas.height - Math.random() * 40;
                }

                this.x = this.startX;
                this.y = this.startY;
                this.lastX = this.x;
                this.lastY = this.y;

                const midX = (this.startX + this.targetX) / 2;
                const midY = (this.startY + this.targetY) / 2;
                this.cp1x = midX + (Math.random() - 0.5) * 30;
                this.cp1y = midY + (Math.random() - 0.5) * 30;
                this.cp2x = this.targetX - (Math.random() - 0.5) * 10;
                this.cp2y = this.targetY + (Math.random() - 0.5) * 10;

                this.baseSpeed = 0.008 + Math.random() * 0.012;
            }

            update(speedMultiplier = 1.0) {
                if (!this.started) {
                    this.delay -= 0.016;
                    if (this.delay <= 0) this.started = true;
                    return;
                }

                this.lastX = this.x;
                this.lastY = this.y;

                this.progress += this.baseSpeed * speedMultiplier;

                // Fade in and out
                if (this.progress < 0.1) {
                    this.opacity = (this.progress / 0.1) * this.maxOpacity;
                } else if (this.progress > 0.9) {
                    this.opacity = ((1 - this.progress) / 0.1) * this.maxOpacity;
                } else {
                    this.opacity = this.maxOpacity;
                }

                const t = this.progress;
                const mt = 1 - t;
                const mt2 = mt * mt;
                const mt3 = mt2 * mt;
                const t2 = t * t;
                const t3 = t2 * t;

                this.x = mt3 * this.startX + 3 * mt2 * t * this.cp1x + 3 * mt * t2 * this.cp2x + t3 * this.targetX;
                this.y = mt3 * this.startY + 3 * mt2 * t * this.cp1y + 3 * mt * t2 * this.cp2y + t3 * this.targetY;

                if (this.progress >= 1) this.reset();
            }

            draw() {
                if (!this.started || this.opacity <= 0) return;

                this.ctx.save();
                this.ctx.globalAlpha = this.opacity;

                const dx = this.x - this.lastX;
                const dy = this.y - this.lastY;
                const velocity = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);

                this.ctx.translate(this.x, this.y);
                this.ctx.rotate(angle);

                const stretch = 1 + velocity * 1.0;
                this.ctx.fillStyle = this.color;
                this.ctx.beginPath();
                this.ctx.ellipse(0, 0, this.baseSize * stretch, this.baseSize, 0, 0, Math.PI * 2);
                this.ctx.fill();

                this.ctx.restore();
            }
        }

        class ParticleSystem {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.speedMultiplier = 4.0;
                this.maxMultiplier = 4.0;
                this.minMultiplier = 1.0;
                this.animationId = null;
                this.color = '#80DDE9';

                this.setupCanvas();
            }

            setupCanvas() {
                const container = this.canvas.closest('.alert-container');
                const rect = container.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;

                const pointsEl = document.getElementById('pointsValue');
                const pointsRect = pointsEl.getBoundingClientRect();
                this.targetX = (pointsRect.left + pointsRect.width / 2) - rect.left;
                this.targetY = (pointsRect.top + pointsRect.height / 2) - rect.top;
            }

            init(count) {
                this.particles = [];
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(this.canvas, this.targetX, this.targetY, this.color));
                }
            }

            updateMultiplier(val) {
                this.speedMultiplier = Math.max(this.minMultiplier, Math.min(this.maxMultiplier, val));
            }

            updateColor(newColor) {
                this.color = newColor;
                this.particles.forEach(p => p.setColor(newColor));
            }

            updateMultiplier(val) {
                this.speedMultiplier = Math.max(this.minMultiplier, Math.min(this.maxMultiplier, val));
            }

            start() {
                this.init(120);
                this.animate();
            }

            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                if (this.speedMultiplier < 1.1 && this.particles.length > 30) {
                    this.particles = this.particles.filter((p, i) => i < 30 || p.progress < 0.8);
                }

                this.particles.forEach(p => {
                    p.update(this.speedMultiplier);
                    p.draw();
                });

                this.animationId = requestAnimationFrame(() => this.animate());
            }
        }

        let animationFrameId = null;

        function animateNumber(element, startValue, finalValue, duration = 2000, particleSystem = null) {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            const startTime = performance.now();

            // Remove bobbing class while animating
            document.getElementById('pointsValue').classList.remove('bobbing');

            if (particleSystem) {
                particleSystem.stop();
                particleSystem.start();
            }

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOutQuint = 1 - Math.pow(1 - progress, 5);

                if (particleSystem) {
                    const particleSpeed = 1.0 + 3.0 * Math.pow(1 - progress, 3);
                    particleSystem.updateMultiplier(particleSpeed);
                }

                const blurAmount = Math.pow(1 - progress, 1.5) * 4;
                element.style.filter = blurAmount > 0.1 ? `blur(${blurAmount}px)` : 'none';

                const currentValue = Math.floor(startValue + (finalValue - startValue) * easeOutQuint);
                element.textContent = currentValue.toLocaleString();

                const scaleProgress = Math.sin(progress * Math.PI);
                const scale = 1 + (scaleProgress * 0.03);
                element.style.transform = `scale(${scale})`;

                if (progress < 1) {
                    animationFrameId = requestAnimationFrame(update);
                } else {
                    element.textContent = finalValue.toLocaleString();
                    element.style.transform = 'scale(1)';
                    element.style.filter = 'none';

                    document.getElementById('pointsValue').classList.add('bobbing');
                    animationFrameId = null;
                }
            }
            animationFrameId = requestAnimationFrame(update);
        }



        function startAnimation() {
            const ps = window.particleSystem;
            const el = document.getElementById('pointsValue');
            animateNumber(el, FLOOR, CEILING, 2000, ps);

            // Start the carrier cycle sequence
            startCarrierCycle();
        }

        window.addEventListener('load', () => {
            window.particleSystem = new ParticleSystem('particleCanvas');

            startAnimation(); // This starts the initial count up AND the cycle timer

            document.getElementById('restartBtn').addEventListener('click', startAnimation);
        });

        window.addEventListener('resize', () => { location.reload(); });
    </script>
</body>

</html>
